    <script>
    const STATE={lastHit:null};

    // MASTER PRICE LIST (explicit intent)
    // If a user asks for a "master price list" (or similar), return a deterministic list.
    // This prevents the search ranker from picking a narrow price entry instead.
    const MASTER_PRICE_LIST_HTML =
      `<span class="tag">MASTER PRICE LIST</span><br>`+

      `• <strong>Custom Theme Development</strong> — <strong>from $980 CAD</strong><br>`+

      `• <strong>Website Design & Development</strong> — <strong>from $2,500 CAD</strong><br>`+
      `• <strong>E-commerce Site Design/Development</strong> — <strong>from $3,200 CAD</strong><br>`+

      `• <strong>Monthly Website Maintenance</strong> — <strong>$99/month CAD</strong><br>`+
      `• <strong>Advanced SEO Audit & Optimization</strong> — <strong>$350 CAD</strong><br>`+
      `• <strong>Website Copywriting</strong> — <strong>$120 CAD per page</strong><br>`+
      `• <strong>Speed Optimization</strong> — <strong>$180 CAD</strong><br>`+
      `<br><strong>More services are available</strong> (migration, staging, calculators, ads, etc.). Ask: <em>“pricing”</em> or a specific service name for details.<br>`+
      `<br><strong>For a quote:</strong> <strong>danieldavidwilds@gmail.com</strong> or <strong>(604) 901-1692</strong>`;

    function isMasterPriceListQuery(q){
      const s=String(q||'').toLowerCase();
      // Catch common phrases without being too broad.
      return (
        /\bmaster\s+(price|pricing)\s+(list|sheet)\b/.test(s) ||
        /\bfull\s+(price|pricing)\s+(list|sheet)\b/.test(s) ||
        /\ball\s+prices\b/.test(s) ||
        /\bcomplete\s+pricing\b/.test(s)
      );
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, ch => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[ch]));
    }

    function normalizeGlossaryKeyStrict(s){
      // Case-insensitive, whitespace-collapsed, but preserves punctuation.
      // This avoids collisions like "C" vs "C++" that a punctuation-stripping key would cause.
      return String(s)
        .replace(/[“”]/g,'"')
        .replace(/[’]/g,"'")
        .toLowerCase()
        .trim()
        .replace(/\s+/g,' ');
    }

    function normalizeGlossaryKeyLoose(s){
      // Punctuation-tolerant variant used only when the match is unambiguous.
      return normalizeGlossaryKeyStrict(s)
        .replace(/[^a-z0-9]+/g,' ')
        .trim()
        .replace(/\s+/g,' ');
    }

    function buildGlossary(entries){
      const strict=new Map();
      const loose=new Map(); // looseKey -> entry | null (null means ambiguous)
      const arr=Array.isArray(entries)?entries:[];

      function addVariant(keyString, entry){
        const strictKey=normalizeGlossaryKeyStrict(keyString);
        if(strictKey) strict.set(strictKey, entry);

        const looseKey=normalizeGlossaryKeyLoose(keyString);
        if(!looseKey) return;
        if(!loose.has(looseKey)){
          loose.set(looseKey, entry);
        } else {
          const existing=loose.get(looseKey);
          if(existing !== entry) loose.set(looseKey, null);
        }
      }

      for(const raw of arr){
        if(!raw) continue;
        const term=String(raw.term||'').trim();
        const definition=String(raw.definition||'').trim();
        if(!term || !definition) continue;
        const e={term, definition};

        addVariant(term, e);
        if(Array.isArray(raw.aliases)){
          for(const a of raw.aliases){
            const alias=String(a||'').trim();
            if(alias) addVariant(alias, e);
          }
        }
      }
      return { strict, loose };
    }

    const GLOSSARY=buildGlossary(window.GLOSSARY_ENTRIES);

    function cleanLookupTerm(s){
      let t=String(s||'').trim();
      t=t.replace(/^["'`]+|["'`]+$/g,'').trim();
      t=t.replace(/^(a|an|the)\s+/i,'');
      return t.trim();
    }

    function extractGlossaryTerm(q){
      const raw=String(q||'').trim();
      if(!raw) return null;
      const q1=raw.replace(/[?!.]+\s*$/,'').trim();

      const patterns=[
        /^define\s+(.+)$/i,
        /^definition\s+of\s+(.+)$/i,
        /^meaning\s+of\s+(.+)$/i,
        /^what\s+is\s+(.+)$/i,
        /^what\s+are\s+(.+)$/i,
        /^what\s+is\s+an\s+(.+)$/i,
        /^what\s+is\s+a\s+(.+)$/i,
        /^what\s+is\s+the\s+(.+)$/i,
        /^what's\s+(.+)$/i,
        /^whats\s+(.+)$/i,
        /^explain\s+(.+)$/i,
        /^tell\s+me\s+about\s+(.+)$/i,
        /^what\s+does\s+(.+?)\s+mean$/i,
      ];
      for(const re of patterns){
        const m=q1.match(re);
        if(m && m[1]) return m[1].trim();
      }
      return null;
    }

    function getGlossaryAnswer(q){
      if(!GLOSSARY.strict.size) return null;
      const raw=String(q||'').trim();
      if(!raw) return null;

      // 1) Direct whole-query match (e.g., "content", "CI/CD", ".NET")
      const directStrictHit=GLOSSARY.strict.get(normalizeGlossaryKeyStrict(raw));
      if(directStrictHit){
        return `<strong>${escapeHtml(directStrictHit.term)}</strong>: ${escapeHtml(directStrictHit.definition)}`;
      }
      const directLooseKey=normalizeGlossaryKeyLoose(raw);
      const directLooseHit=directLooseKey ? GLOSSARY.loose.get(directLooseKey) : null;
      if(directLooseHit){
        return `<strong>${escapeHtml(directLooseHit.term)}</strong>: ${escapeHtml(directLooseHit.definition)}`;
      }

      // 2) Explicit definition/meaning intent (e.g., "what is content")
      const candidate=extractGlossaryTerm(raw);
      if(candidate){
        const cleaned=cleanLookupTerm(candidate);
        const strictHit=GLOSSARY.strict.get(normalizeGlossaryKeyStrict(cleaned));
        if(strictHit){
          return `<strong>${escapeHtml(strictHit.term)}</strong>: ${escapeHtml(strictHit.definition)}`;
        }
        const looseKey=normalizeGlossaryKeyLoose(cleaned);
        const looseHit=looseKey ? GLOSSARY.loose.get(looseKey) : null;
        if(looseHit){
          return `<strong>${escapeHtml(looseHit.term)}</strong>: ${escapeHtml(looseHit.definition)}`;
        }
      }

      // 3) Embedded-term fallback: pick the longest *unambiguous* loose-key term present in the query
      // Example: "Can you explain content strategy?" => "content strategy" (if present).
      const tokens=normalizeGlossaryKeyLoose(raw).split(' ').filter(Boolean);
      if(tokens.length){
        const maxWindow=Math.min(tokens.length, 12);
        for(let window=maxWindow; window>=1; window--){
          for(let i=0; i+window<=tokens.length; i++){
            const phrase=tokens.slice(i, i+window).join(' ');
            const embeddedHit=GLOSSARY.loose.get(phrase);
            if(embeddedHit){
              return `<strong>${escapeHtml(embeddedHit.term)}</strong>: ${escapeHtml(embeddedHit.definition)}`;
            }
          }
        }
      }

      return null;
    }

    const STOPWORDS=new Set([
      'a','an','and','are','as','at','be','but','by','can','could','did','do','does','for','from','had','has','have','how',
      'i','if','in','is','it','me','my','of','on','or','our','please','so','that','the','their','them','then','they','this',
      'to','was','we','what','when','where','who','why','will','with','would','you','your'
    ]);

    const SYNONYMS=new Map([
      ['web','website'],['site','website'],['websites','website'],['webpage','website'],['pages','page'],
      ['costs','cost'],['prices','price'],['pricing','price'],['fees','fee'],['quote','estimate'],['quotes','estimate'],
      ['call','phone'],['email','contact'],['reach','contact'],['hire','book'],['booking','book'],
      ['woocommerce','ecommerce'],['shopify','ecommerce'],['store','ecommerce'],['shop','ecommerce'],['commerce','ecommerce'],['ecom','ecommerce'],
      ['seo','seo'],['ranking','seo'],['google','seo'],
      ['speed','performance'],['fast','performance'],['pagespeed','performance'],
      ['secure','security'],['safety','security'],['hack','security'],
      ['update','maintenance'],['updates','maintenance'],['support','maintenance'],
      ['ads','advertising'],['adwords','advertising'],['ppc','advertising'],['sem','advertising'],
      ['mailchimp','emailmarketing'],['klaviyo','emailmarketing'],['newsletter','emailmarketing'],
      ['calendly','booking'],['acuity','booking'],['appointment','booking'],['schedule','booking'],
      ['chat','livechat'],['chatbot','livechat'],['tawk','livechat'],
      ['gdpr','privacy'],['pipeda','privacy'],['cookie','privacy'],['cookies','privacy'],
      ['linkedin','socialmedia'],['instagram','socialmedia'],['facebook','socialmedia'],['tiktok','socialmedia'],
      ['outlook','email'],['workspace','email'],['microsoft365','email'],
      ['schemamarkup','schema'],['structureddata','schema'],['jsonld','schema'],['richresult','schema'],
      ['wordpress','cms'],['webmaster','w3bmstr'],['w3b','w3bmstr'],
      ['laptop','computer'],['desktop','computer'],['pc','computer'],['mac','computer'],
      ['smartphone','phone'],['iphone','phone'],['android','phone'],['cellphone','phone'],
      ['redirect','redirect301'],['404','redirect301'],['brokenlink','redirect301'],
      ['bilingual','multilingual'],['french','multilingual'],['translation','multilingual'],
      ['audit','siteaudit'],['review','siteaudit'],['analyse','siteaudit'],['analyze','siteaudit'],
      ['landing','landingpage'],['funnel','landingpage'],['squeeze','landingpage'],['salespage','landingpage'],

      ['webp','imageoptimization'],['lazyloa','imageoptimization'],
      ['lazyload','imageoptimization'],['lazyloading','imageoptimization'],
      ['bounce','bouncerate'],['conversion','conversionrate'],['cta','calltoaction'],
      ['cwv','corewebvitals'],['lcp','corewebvitals'],['cls','corewebvitals'],['inp','corewebvitals'],

      ['nap','nap'],['citation','nap'],
      ['yelp','directories'],['yellowpages','directories'],['foursquare','directories'],
      ['gmb','googlebusiness'],['gbp','googlebusiness'],['googlemybusiness','googlebusiness'],
      ['applemaps','applebusiness'],['siri','applebusiness'],['spotlight','applebusiness'],

      // NEW SYNONYMS
      ['retargeting','retargeting'],['remarketing','retargeting'],
      ['meta','facebook'],['hotjar','heatmap'],['clarity','heatmap'],
      ['zapier','apiintegration'],['learndash','lms'],['teachable','lms'],['moodle','lms'],
      ['textmagic','smsmarketing'],['twilio','smsmarketing'],
      ['opentable','booking'],['resy','booking'],
      ['reel','shortvideo'],
      ['migration','migration'],['staging','staging'],
      ['pwa','pwa'],['membership','membership'],
      ['heatmap','heatmap'],['crm','crm'],['malware','malware'],
      ['brochure','brochure'],['infographic','infographic'],
      ['favicon','favicon'],['darkmode','darkmode'],
      ['podcast','podcast'],['affiliate','affiliate'],
      ['pitchdeck','pitchdeck'],['letterhead','letterhead']
      ,
      // TAX TERMS
      ['gst','tax'],['pst','tax'],['hst','tax'],['taxes','tax'],['tax','tax']
    ]);

    const FOLLOWUP_HINTS=new Set(['more','details','tell','explain','that','this','it','them','those','he','she','they','what','how']);
    const CONTEXT_BREAKERS=new Set([
      'wordpress','html','ecommerce','woocommerce','shopify','seo','listing','security','maintenance','hosting','domain','contact',
      'robot','robots','aurora','maya','riley',
      'landing','audit','training','computer','hardware','software','networking','phones',
      'schema','cdn','gdpr','pipeda','webp','caching','redirect','advertising','privacy',
      'multilingual','brochure','portfolio','accessibility','analytics','blog','yelp','directories',
      'w3bmstr','diploma','experience','booking','livechat','socialmedia','emailmarketing',
      // NEW CONTEXT BREAKERS
      'migration','staging','pwa','membership','directory','restaurant','realestate','nonprofit',
      'church','calculator','favicon','retargeting','linkedin','youtube',
      'sms','podcast','affiliate','lms','portal','heatmap','crm','malware','infographic',
      'letterhead','businesscard','pitchdeck','reel','shortvideo','darkmode',
      'abandoned','upsell','coupon','currency','careplan','competitor','keyword',
      'linkbuilding','pressrelease','shopifystore','subscription','digitalproduct'
    ]);
    const AMBIGUOUS_CONTEXT_TOKENS=new Set([
      'much','cost','price','pricing','timeline','time','long','duration','week','weeks','day','days','more','detail','details',
      'help','contact','email','phone','where','location','hour','hours'
    ]);

    function norm(str){
      return String(str)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g,' ')
        .trim();
    }

    function stem(token){
      let t=token;
      if(t.length>4 && t.endsWith('ing')) t=t.slice(0,-3);
      if(t.length>3 && t.endsWith('ed')) t=t.slice(0,-2);
      if(t.length>3 && t.endsWith('s')) t=t.slice(0,-1);
      return t;
    }

    function tokenize(str){
      const n=norm(str);
      if(!n) return [];
      return n
        .split(/\s+/)
        .filter(Boolean)
        .map(stem)
        .map(t=>{
          if(t.startsWith('woocom')) return 'woocommerce';
          return SYNONYMS.get(t) ?? t;
        })
        .filter(t=>t.length>1 && !STOPWORDS.has(t));
    }

    function levenshtein(a,b){
      if(a===b) return 0;
      const al=a.length, bl=b.length;
      if(al===0) return bl;
      if(bl===0) return al;
      const v0=new Array(bl+1);
      const v1=new Array(bl+1);
      for(let i=0;i<=bl;i++) v0[i]=i;
      for(let i=0;i<al;i++){
        v1[0]=i+1;
        for(let j=0;j<bl;j++){
          const cost=a[i]===b[j]?0:1;
          v1[j+1]=Math.min(v1[j]+1, v0[j+1]+1, v0[j]+cost);
        }
        for(let j=0;j<=bl;j++) v0[j]=v1[j];
      }
      return v1[bl];
    }

    function fuzzyTokenMatch(qTokens, needle){
      if(!needle) return false;
      if(qTokens.includes(needle)) return true;
      if(needle.length<4) return false;
      const maxDist=needle.length>=8?2:1;
      for(const t of qTokens){
        if(Math.abs(t.length-needle.length)>2) continue;
        if(levenshtein(t,needle)<=maxDist) return true;
      }
      return false;
    }

    function expandWithContext(tokens){
      if(!STATE.lastHit) return tokens;
      const isShort=tokens.length<=2;
      const shortIsAmbiguous=tokens.length>0 && tokens.every(t=>AMBIGUOUS_CONTEXT_TOKENS.has(t));
      const hasBreaker=tokens.some(t=>CONTEXT_BREAKERS.has(t));
      const looksLikeFollowup=tokens.some(t=>FOLLOWUP_HINTS.has(t));
      if(((isShort && shortIsAmbiguous) || looksLikeFollowup) && !hasBreaker){
        const extra=STATE.lastHit._topicTokens ?? [];
        const merged=[...tokens];
        for(const t of extra){ if(!merged.includes(t)) merged.push(t); }
        return merged;
      }
