    function norm(str){
      return String(str)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g,' ')
        .trim();
    }

    function stem(token){
      let t=token;
      if(t.length>4 && t.endsWith('ing')) t=t.slice(0,-3);
      if(t.length>3 && t.endsWith('ed')) t=t.slice(0,-2);
      if(t.length>3 && t.endsWith('s')) t=t.slice(0,-1);
      return t;
    }

    function tokenize(str){
      const n=norm(str);
      if(!n) return [];
      return n
        .split(/\s+/)
        .filter(Boolean)
        .map(stem)
        .map(t=>{
          if(t.startsWith('woocom')) return 'woocommerce';
          return SYNONYMS.get(t) ?? t;
        })
        .filter(t=>t.length>1 && !STOPWORDS.has(t));
    }

    function levenshtein(a,b){
      if(a===b) return 0;
      const al=a.length, bl=b.length;
      if(al===0) return bl;
      if(bl===0) return al;
      const v0=new Array(bl+1);
      const v1=new Array(bl+1);
      for(let i=0;i<=bl;i++) v0[i]=i;
      for(let i=0;i<al;i++){
        v1[0]=i+1;
        for(let j=0;j<bl;j++){
          const cost=a[i]===b[j]?0:1;
          v1[j+1]=Math.min(v1[j]+1, v0[j+1]+1, v0[j]+cost);
        }
        for(let j=0;j<=bl;j++) v0[j]=v1[j];
      }
      return v1[bl];
    }

    function fuzzyTokenMatch(qTokens, needle){
      if(!needle) return false;
      if(qTokens.includes(needle)) return true;
      if(needle.length<4) return false;
      const maxDist=needle.length>=8?2:1;
      for(const t of qTokens){
        if(Math.abs(t.length-needle.length)>2) continue;
        if(levenshtein(t,needle)<=maxDist) return true;
      }
      return false;
    }

    function expandWithContext(tokens){
      if(!STATE.lastHit) return tokens;
      const isShort=tokens.length<=2;
      const shortIsAmbiguous=tokens.length>0 && tokens.every(t=>AMBIGUOUS_CONTEXT_TOKENS.has(t));

      const looksLikeFollowup=tokens.some(t=>FOLLOWUP_HINTS.has(t));
      if(((isShort && shortIsAmbiguous) || looksLikeFollowup) && !hasBreaker){
        const extra=STATE.lastHit._topicTokens ?? [];
        const merged=[...tokens];
        for(const t of extra){ if(!merged.includes(t)) merged.push(t); }
        return merged;
      }
      return tokens;
    }

  {k:['wordpress pricing','wordpress breakdown','wordpress website pricing breakdown','basic wordpress setup','custom design and branding','content creation','e-commerce integration','woocommerce setup cost','seo included'],t:'WORDPRESS PRICING BREAKDOWN',a:'<span class="tag">WORDPRESS BREAKDOWN (CAD)</span><br><strong>Basic WordPress Setup</strong> — $300–$600 (theme install, basic pages, SEO setup)<br><strong>Custom Design & Branding</strong> — $600–$1,200+ (tailored visuals, layout, mobile responsiveness)<br><strong>E-commerce Integration</strong> — $800–$1,500+ (WooCommerce, products, payment gateways)<br><strong>Content Creation</strong> — $150–$500 (writing pages/blog/product copy)<br><strong>SEO Optimization</strong> — included or +$200–$500 (advanced keyword strategy, metadata, images)<br><strong>Maintenance & Updates</strong> — $75–$150/month (support, backups, plugin updates)'},
  {k:['wordpress packages','wp packages','package name price range','starter site 500','starter site 500 800','business pro 1200','business pro 1200 2000','e-commerce 1500','e commerce 1500 3000','e-commerce 1500 3000','wordpress starter package','wordpress business pro package','wordpress e-commerce package'],t:'WORDPRESS PACKAGES',a:'<span class="tag">WORDPRESS PACKAGES (CAD)</span><br><strong>Starter Site</strong> — $500–$800<br>• Basic setup<br>• 3–5 pages<br>• SEO essentials<br><br><strong>Business Pro</strong> — $1,200–$2,000<br>• Custom design<br>• Content support<br>• SEO + image optimization<br>• Contact forms<br><br><strong>E-Commerce</strong> — $1,500–$3,000+<br>• Full store setup<br>• Product uploads<br>• Payment integration<br>• Shipping configuration'},
  {k:['mobile','responsive','phone','tablet','device'],t:'GENERAL WEB DESIGN',a:'Yes. Every website Daniel builds is fully <strong>responsive</strong> and tested across phones, tablets, and desktops. Mobile optimization is not an add-on — it is a standard part of every project. Over half of all web traffic comes from mobile devices, so this is non-negotiable.'},
  {k:['redesign','existing','modernize','update','refresh'],t:'GENERAL WEB DESIGN',a:'Yes. Daniel can modernize your design, improve load speeds, update your content, fix broken elements, and optimize for SEO and conversions. Redesigns are available for both HTML and WordPress sites. He can work from your existing content or help refresh it entirely.'},
  {k:['ecommerce','e-commerce','shop','store','woocommerce','shopify','product'],t:'GENERAL WEB DESIGN',a:'Yes. Daniel builds online stores using <strong>WooCommerce</strong> (WordPress) and <strong>Shopify</strong>. This includes product setup, category organization, payment gateway integration, shipping configuration, and training so you can manage your store with confidence.'},
  {k:['update myself','manage','self','own','cms','edit'],t:'GENERAL WEB DESIGN',a:'For <strong>WordPress sites</strong>, yes — Daniel provides hands-on training so you can manage pages, posts, images, and products on your own. For HTML sites, updates require code changes, which Daniel can handle through a maintenance plan or on a one-off basis.'},
  {k:['outside','international','remote','abroad','other province','canada'],t:'GENERAL WEB DESIGN',a:'Yes. Daniel works remotely and serves clients <strong>across Canada and internationally</strong>. All communication, file sharing, and project management can be handled online via email, video calls, or messaging — whatever works best for you.'},
  {k:['squarespace','wix','template','builder','different','vs'],t:'GENERAL WEB DESIGN',a:'Template builders are fast and inexpensive, but every site looks similar and you\'re limited by their constraints. Daniel builds sites <strong>custom-tailored</strong> to your brand and goals — with better performance, real SEO setup, and no monthly platform fees locking you in. <strong>You own everything outright.</strong>'},
  {k:['html','custom html','hand-coded','hand coded','static'],t:'CUSTOM HTML',a:'A custom HTML website is hand-coded from scratch using HTML, CSS, and JavaScript. There are no page builders, no plugins, and no bloated frameworks — just clean, lean code purpose-built for your site. The result is exceptional load speed, strong security, and minimal ongoing maintenance.'},
  {k:['html over wordpress','html vs wordpress','why html','choose html'],t:'CUSTOM HTML',a:'HTML sites load significantly faster, have no plugin vulnerabilities, and require almost no ongoing maintenance. They are a great fit for portfolios, landing pages, event sites, and any business that doesn\'t need frequent content updates. If your site is mostly static, HTML is the cleaner, faster choice.'},
  {k:['add feature','add later','grow','expand html','add to html'],t:'CUSTOM HTML',a:'Yes. Contact forms, image galleries, animations, booking widgets, maps, and custom scripts can all be integrated at any time. HTML sites are not rigid — they can grow with your business. Daniel can also migrate an HTML site to WordPress if your needs change.'},
  {k:['fast','speed','load','pagespeed','performance','score'],t:'CUSTOM HTML',a:'Custom HTML sites typically score in the <strong>90–100 range</strong> on Google PageSpeed Insights when images are optimized. Fast load times improve both user experience and SEO rankings. This is one of the biggest advantages of going custom over a template platform.'},
  {k:['suited for','best for','who is','ideal','good for','right for'],t:'CUSTOM HTML',a:'HTML sites are ideal for <strong>photographers, tradespeople, local service businesses, freelancers, and event promoters</strong> — anyone who wants a clean professional web presence without the complexity of a CMS. If you don\'t need to post blog content or manage a large product catalogue, HTML is likely the better choice.'},
  {k:['why wordpress','choose wordpress','wordpress good','wordpress benefit'],t:'WORDPRESS',a:'WordPress powers over <strong>40% of all websites globally</strong> — it\'s flexible, scalable, and easy to manage without technical knowledge. It\'s ideal for service businesses, blogs, eCommerce, and any site where you want to update content regularly without hiring a developer every time.'},
  {k:['custom theme','wordpress theme','theme'],t:'WORDPRESS',a:'Yes. Daniel can build a theme from scratch or customize an existing theme to match your brand precisely. This includes custom layouts, typography, color schemes, header and footer design, and any special components your business requires.'},
  {k:['plugin','plugins','configuration','yoast','wordfence'],t:'WORDPRESS',a:'Yes. Daniel selects, installs, and configures the right plugins for your needs — including SEO (Yoast, Rank Math), security (Wordfence), forms (WPForms, Gravity Forms), eCommerce (WooCommerce), caching, analytics, and more. Only trusted, well-maintained plugins are used and the total count is kept lean for performance.'},
  {k:['secure','security','hack','safe','protection','firewall','ssl'],t:'WORDPRESS',a:'Yes. Daniel applies security hardening as a standard part of every WordPress build — including login protection, firewall setup, SSL configuration, file permissions, and removing default attack surfaces. Ongoing maintenance plans include regular security monitoring and updates.'},
  {k:['migrate','migration','switch','move to wordpress','from squarespace'],t:'WORDPRESS',a:'Yes. Daniel can migrate your existing website — whether it\'s a static HTML site, another CMS, or a hosted platform like Squarespace or Wix — into WordPress while preserving your content, URLs, and SEO equity where possible.'},
  {k:['training','teach','learn','wordpress training','how to use'],t:'WORDPRESS',a:'Yes. Every WordPress project includes walkthrough training so you can confidently manage your site. Daniel covers the editor, adding pages and posts, uploading images, updating menus, and basic plugin management. Written documentation is also available on request.'},
  {k:['seo','search engine','rank','ranking','optimization','google','keyword'],t:'SEO',a:'Yes. Daniel provides <strong>on-page SEO</strong> as a standard part of every build — including keyword research, title tags, meta descriptions, heading structure, image alt text, and internal linking. Standalone SEO packages are also available for sites that need a more comprehensive strategy.'},
  {k:['will i rank','rank on google','appear on google','show on google'],t:'SEO',a:'A well-built, SEO-optimized site gives you the best possible foundation. Actual rankings depend on your competition, content quality, and ongoing SEO activity. Daniel builds the technical foundation correctly from day one, and offers ongoing SEO packages to keep improving your visibility over time.'},
  {k:['image seo','image optim','alt text','webp','geotag'],t:'SEO',a:'Yes. Daniel renames image files with descriptive keywords, adds proper alt text, compresses images, and converts to modern formats like <strong>WebP</strong> where applicable. For local businesses, he also geotags photos to improve visibility in local search results.'},
  {k:['analytics','google analytics','search console','ga4','tracking'],t:'SEO',a:'Yes. Daniel integrates <strong>Google Analytics 4</strong> and <strong>Google Search Console</strong> so you can track visitor behaviour, traffic sources, keyword rankings, and technical issues. These tools are essential for understanding your audience and measuring SEO results.'},
  {k:['local seo','near me','local search','local','area','city','nap'],t:'SEO',a:'Local SEO helps your business appear in searches like "web designer near me" or "plumber in Kamloops." Daniel optimizes your site and listings for your geographic area — including NAP consistency (name, address, phone), location keywords, Google Business Profile optimization, and local citation building.'},
  {k:['how long seo','seo time','seo results','seo months'],t:'SEO',a:'SEO is a long-term strategy. Technical improvements can show results in a few weeks, but competitive keyword rankings typically take <strong>3–6 months</strong> of consistent work. Local SEO for less-competitive markets can show results faster. Daniel sets realistic expectations and tracks progress monthly.'},
  {k:['listing','google business','bing places','apple business','maps'],t:'BUSINESS LISTINGS',a:'Daniel sets up listings on <strong>Google Business Profile</strong>, <strong>Bing Places for Business</strong>, and <strong>Apple Business Connect</strong> — the three most important platforms for local visibility, covering the vast majority of search queries across all devices and operating systems.'},
  {k:['business visibility packages','visibility packages','starter package','starter visibility','starter 99','99 one time','99 one-time','pro package','pro 199','199 setup','29 per month','29/month','elite package','elite 399','399 setup','59 per month','59/month','yelp listing','yellowpages','foursquare','facebook business page','branded email','google search console','search console','google analytics','monthly performance reports','verification assistance','priority support','review monitoring','monthly listing updates'],t:'BUSINESS VISIBILITY PACKAGES',a:'<span class="tag">BUSINESS VISIBILITY PACKAGES</span><br><strong>&#127807; Starter Package</strong> — <strong>$99</strong> one-time setup<br>Perfect for new businesses or side hustles.<br>• Google Business Profile setup<br>• Bing Places for Business setup<br>• Apple Business Connect setup<br>• Business info, hours, photos, category<br>• Verification assistance<br><br><strong>&#128640; Pro Package</strong> — <strong>$199</strong> setup + <strong>$29/month</strong><br>Everything in Starter, plus:<br>• Yelp listing setup<br>• Facebook Business Page creation<br>• Monthly listing updates (hours, photos, offers)<br>• Basic review monitoring<br>• Priority support<br><br><strong>&#128081; Elite Package</strong> — <strong>$399</strong> setup + <strong>$59/month</strong><br>Everything in Pro, plus:<br>• Listings on 5+ directories (Yelp, YellowPages, Foursquare, etc.)<br>• SEO optimization for all listings<br>• Branded email setup (e.g., info@yourbusiness.com)<br>• Google Search Console & Analytics setup<br>• Monthly performance reports'},
  {k:['what do you handle','what do you typically handle','claim listing','verification','nap','hours','categories','photos','logo upload','postcard'],t:'BUSINESS LISTINGS — WHAT\'S INCLUDED',a:'<span class="tag">LISTINGS SETUP INCLUDES</span><br>Typically handled:<br>• Profile creation or claiming<br>• Business name, address, phone (NAP)<br>• Hours of operation<br>• Category selection<br>• Photos + logo upload<br>• Verification (postcard/phone/email)<br><br><span class="tag">OPTIONAL ADD-ONS</span><br>• Review monitoring & response<br>• Post updates/offers<br>• Add booking links<br>• Social sync<br>• SEO optimization for listings<br>• Additional directories (Apple Maps/Yelp/etc.)'},
  {k:['why apple maps','apple maps','siri','spotlight','iphone users','ios audience','default navigation app'],t:'WHY APPLE MAPS MATTERS',a:'Apple Maps matters because it reaches a massive iOS audience and powers discovery via <strong>Apple Maps</strong>, <strong>Siri</strong>, and <strong>Spotlight Search</strong>. If your business isn\'t listed there, you miss visibility for a large share of mobile users — even if you\'re on Google and Bing.'},
  {k:['why listing','listing important','listing benefit','business listing why'],t:'BUSINESS LISTINGS',a:'Verified business listings help customers find you in local searches, provide your hours and contact info in one click, allow customers to leave reviews, and signal to Google that your business is legitimate. They are one of the <strong>highest-ROI visibility investments</strong> any local business can make.'},
  {k:['listing information','listing content','listing setup','what listing'],t:'BUSINESS LISTINGS',a:'Daniel handles business name, address, phone number, website URL, hours of operation, business categories, description, logo, cover photo, and additional photos. He also assists with the verification process and ensures your information is consistent across all three platforms.'},
  {k:['ongoing listing','listing management','listing monthly','listing update'],t:'BUSINESS LISTINGS',a:'Yes. Pro and Elite listing packages include monthly updates, review monitoring, performance reports, photo refreshes, and corrections if Google auto-suggests changes to your listing. Keeping listings accurate and active is important for maintaining local search rankings.'},
  {k:['existing listing','already have','improve listing','optimize listing'],t:'BUSINESS LISTINGS',a:'Absolutely. Many existing listings are incomplete, have outdated information, or are missing photos and categories. Daniel audits your current listing, identifies gaps, and fully optimizes it to perform at its best.'},
  {k:['package','packages','starter','business pro','elite','what do i get'],t:'PRICING & PACKAGES',a:'Daniel offers <strong>Starter, Business Pro, eCommerce, and Custom</strong> website packages, as well as <strong>Starter, Pro, and Elite</strong> visibility packages covering Google, Bing, and Apple listings. Each package has a defined scope so you know exactly what you\'re getting.'},
  {k:['customize package','custom package','remove','add extra','adjust'],t:'PRICING & PACKAGES',a:'Yes. Every business has unique needs. Daniel is happy to remove services you don\'t need or add extras like copywriting, logo design, additional pages, or ongoing SEO. Custom packages are quoted individually with full transparency.'},
  {k:['deposit','upfront','start','begin','first payment'],t:'PRICING & PACKAGES',a:'Yes. A deposit is required to begin work. This secures your spot in the project schedule and covers initial work such as design mockups and research. The remaining balance is due upon project completion before the site goes live.'},
  {k:['ongoing cost','after launch','hosting','domain','annual','monthly cost'],t:'PRICING & PACKAGES',a:'Yes — domain registration (typically <strong>$15–$20 CAD/year</strong>) and hosting are ongoing costs. WordPress sites may also have costs for premium plugins. Optional maintenance plans are available monthly. Daniel will outline all expected costs before the project begins.'},
  {k:['payment plan','installment','milestone payment','pay over time'],t:'PRICING & PACKAGES',a:'For larger projects, Daniel is open to discussing a <strong>milestone-based payment structure</strong>. This is something you can discuss during the initial consultation. Contact Daniel to talk through what works best for your budget.'},
  {k:['maintenance','maintain','maintenance plan','monthly plan','support plan'],t:'MAINTENANCE',a:'Yes. Maintenance plans include plugin and theme updates, security monitoring, performance checks, offsite backups, and small content changes. Having a maintenance plan gives you peace of mind that your site is always running securely and correctly.'},
  {k:['break','down','broken','crash','not working','fix'],t:'MAINTENANCE',a:'If you are on a maintenance plan, Daniel prioritizes fixing issues promptly. For clients without a plan, he offers one-time support fixes on a per-incident basis. Backups are also kept as part of maintenance plans so recovery is fast when something goes wrong.'},
  {k:['plugin update','theme update','update plugin','keeping updated'],t:'MAINTENANCE',a:'Yes. Plugin and theme updates are included in all maintenance plans. Updates are tested carefully before being applied to your live site — outdated plugins are one of the most common causes of WordPress security vulnerabilities and site breakages.'},
  {k:['backup','backups','offsite backup','restore','data'],t:'MAINTENANCE',a:'Yes. Maintenance plans include regular <strong>offsite backups</strong> stored separately from your hosting account. This means if your host ever has an issue, your site data is safe and can be restored quickly.'},
  {k:['logo','brand','branding','branding kit','palette','identity'],t:'BRANDING',a:'Yes. Daniel designs clean, modern logos and full branding kits including colour palettes, typography, and usage guidelines. A strong logo is the foundation of a professional business identity and ensures your brand looks consistent across your website, listings, and printed materials.'},
  {k:['copy','copywrite','content','write','text','page content','words'],t:'BRANDING',a:'Yes. Daniel offers copywriting for home pages, about pages, service pages, landing pages, product descriptions, and blog articles. Good copy is essential for both <strong>SEO and conversions</strong> — it tells visitors who you are and why they should choose you.'},
  {k:['visual','graphic','image','banner','social media','icon'],t:'BRANDING',a:'Yes. Daniel provides image sourcing, optimization, graphic design, icons, banners, and branded social media assets. Consistent visuals across your website and listings strengthen your brand and improve professionalism in the eyes of potential customers.'},
  {k:['already have logo','existing brand','my logo','own branding','existing logo'],t:'BRANDING',a:'No problem. Daniel will match the website design to your existing brand identity — using your logo, colours, fonts, and tone of voice. Just share your brand assets and guidelines and he\'ll work within them.'},
  {k:['need from me','what do you need','get started','requirements','provide'],t:'PROCESS',a:'Daniel needs: your goals and vision, preferred style or examples you like, your existing content (text and images), branding materials (logo, colours, fonts), and any specific features you need. The more detail you share upfront, the smoother and faster the project will go.'},
  {k:['communicate','communication','contact during','updates','how do we'],t:'PROCESS',a:'Email, phone, or scheduled video calls — whatever works best for you. Daniel provides regular updates as milestones are reached and responds to messages promptly. Clear communication is a priority throughout every project.'},
  {k:['project timeline','timeline','schedule','stages','milestones'],t:'PROCESS',a:'Yes. You\'ll receive a clear timeline outlining each stage: discovery, design, development, review, and launch. Milestones help keep the project on track and give you visibility into progress at every stage.'},
  {k:['revision','revisions','changes','how many changes','rounds'],t:'PROCESS',a:'Revision rounds are outlined in your project agreement. Most packages include <strong>two or three rounds</strong> of revisions. Daniel aims to get things right the first time by gathering thorough requirements upfront — so revisions tend to be minor adjustments rather than major changes.'},
  {k:['rush','urgent','fast','deadline','quick','asap'],t:'PROCESS',a:'Rush options are available depending on current workload. A rush fee may apply for projects requiring an accelerated timeline. Contact Daniel to discuss your deadline and he\'ll do his best to accommodate it.'},
  {k:['own','ownership','who owns','mine','my website'],t:'OWNERSHIP',a:'You own the website, all content, and all deliverables in full once the project is paid in full. There are <strong>no licensing fees, no ongoing payments, and no lock-in of any kind</strong>. It\'s yours.'},
  {k:['domain','hosting','own domain','own hosting','my domain'],t:'OWNERSHIP',a:'Yes. Your domain and hosting accounts are always registered in your name. Daniel never holds ownership of your domain or hosts your site on accounts you can\'t access. <strong>You are always in control of your own infrastructure.</strong>'},
  {k:['license','licensing','font license','image license','stock'],t:'OWNERSHIP',a:'Yes. Any licensed stock images, icon sets, or fonts used in your project will be documented clearly. Where possible, Daniel uses free or open-licence assets to keep your ongoing costs minimal.'},
  {k:['where','location','based','british columbia','bc','canada'],t:'CONTACT',a:'Daniel works remotely from <strong>British Columbia, Canada</strong>, and serves clients across Canada and internationally. Remote work means lower overhead and better value — and he\'s experienced at collaborating with clients in different time zones.'},
  {k:['hours','business hours','open','when','available','monday','friday'],t:'CONTACT',a:'Monday to Friday, <strong>8:00 AM to 6:00 PM Pacific Time</strong>. Daniel does his best to respond to all inquiries within one business day.'},
  {k:['contact','reach','email','phone','call','get in touch'],t:'CONTACT',a:'<strong>Email:</strong> danieldavidwilds@gmail.com<br><strong>Phone:</strong> (604) 901-1692<br><br>Email is the fastest way to reach Daniel and allows you to share files, links, and detailed information. He\'s also happy to schedule a call to discuss your project in detail.'},
  {k:['quote','estimate','free quote','no obligation','how do i get'],t:'CONTACT',a:'Send an email or call with a brief description of your project — what type of site you need, your goals, and any features or services you\'re interested in. Daniel will follow up with a <strong>free, no-obligation quote</strong> tailored to your specific needs.'},

  {k:['services','what services','what do you offer','offerings','can you help with'],t:'SERVICES',a:'Daniel can help with: <strong>website design & development</strong> (custom HTML or WordPress), <strong>eCommerce</strong> (WooCommerce/Shopify), <strong>SEO</strong>, <strong>business listings</strong> (Google/Bing/Apple), <strong>branding</strong> (logos/visuals), <strong>copywriting</strong>, and <strong>maintenance</strong> for ongoing updates and support.'},
  {k:['budget','budget range','how much should i spend','what does 5000 get','what does 2000 get','price range','diy','starter business','professional','advanced','enterprise'],t:'BUDGET TIERS (GUIDE)',a:'<span class="tag">BUDGET TIERS (GUIDE)</span><br><strong>$99–$500</strong>: DIY builders (Wix/Squarespace/WordPress.com), basic one-pagers, small freelancer gigs<br><strong>$500–$2,000</strong>: Starter business sites (custom WP/Shopify setup, basic SEO, forms, responsive design)<br><strong>$2,000–$5,000</strong>: Professional presence (custom UI/UX, CMS, eCommerce, copy + SEO, analytics/integrations)<br><strong>$5,000–$10,000</strong>: Advanced functionality & branding (bespoke design, custom dev, performance/security/accessibility audits)<br><strong>$10,000+</strong>: Enterprise/scalable platforms (full-stack, DevOps, headless CMS, advanced features, ongoing SLA support)<br><br>If you tell me your industry + goals + pages/features, I can suggest the best tier.'},
  {k:['portfolio','examples','work','previous work','show me','case studies'],t:'SERVICES',a:'Yes — Daniel can share examples of past work and relevant samples based on your industry (service business, trades, retail, etc.). Email <strong>danieldavidwilds@gmail.com</strong> and mention what style you like, and he\'ll send the closest matches.'},
  {k:['booking','book','hire','start','get started','next step'],t:'PROCESS',a:'The fastest way to start is to email <strong>danieldavidwilds@gmail.com</strong> with: your business type, the kind of website you want (HTML/WordPress/eCommerce), how many pages you expect, and any must-have features. Daniel will reply with questions + a clear next step and timeline.'},
  {k:['what do you need from me','what do i need to provide','content','images','text','logo'],t:'PROCESS',a:'To move quickly, Daniel typically needs: your <strong>logo/branding</strong> (if you have it), the <strong>pages</strong> you want, your <strong>text content</strong> (or notes for copywriting), <strong>photos</strong> (or examples), and any <strong>links</strong> to competitor sites you like. If you don\'t have content yet, he can help you organize it.'},
  {k:['hosting','host','where is it hosted','server','web host'],t:'OWNERSHIP',a:'Hosting can be set up on a provider that fits your budget and needs. The key point: your hosting and domain should be in <strong>your name</strong> so you stay in control. Daniel can recommend options and help set everything up.'},
  {k:['domain','buy a domain','domain name','dns','email domain'],t:'OWNERSHIP',a:'Yes — Daniel can help you choose and set up a domain, connect DNS, and (if you want) set up professional email. Domains are usually an annual cost, and you should own the registrar account.'},
  {k:['accessibility','a11y','ada','wcag','accessible'],t:'GENERAL WEB DESIGN',a:'Daniel can build with accessibility in mind (clear headings, readable contrast, keyboard-friendly navigation, alt text, and good structure). If you have a specific compliance target (like WCAG level), mention it up front so it can be scoped properly.'},
  {k:['contact form','forms','lead form','quote form'],t:'CUSTOM HTML',a:'Yes. Contact/quote forms can be added to custom HTML or WordPress sites. The form can send leads to email and include anti-spam protection. If you have a preferred CRM or form service, Daniel can integrate it.'},
  {k:['maintenance cost','monthly maintenance','ongoing support cost','support pricing'],t:'MAINTENANCE',a:'Maintenance is optional and depends on how often you want updates, backups, security checks, and content changes. If you describe your site type and how hands-on you want to be, Daniel can recommend the simplest plan that covers it.'},

  // ── ABOUT DANIEL ──────────────────────────────────────────────────────────
  {k:['who is daniel','about daniel','w3bmstr','web master','who made this','who built this','daniel wilds'],t:'ABOUT DANIEL',a:'<strong>Daniel Wilds</strong> is a web designer and developer operating under the brand <strong>W3B&#127809;MSTR</strong>, based in <strong>British Columbia, Canada</strong>. With 20+ years of experience, he specializes in custom HTML websites, WordPress, eCommerce, SEO, branding, and business listings — helping businesses get established online and get found.'},
  {k:['experience','years experience','how long in business','background','veteran','senior designer'],t:'ABOUT DANIEL',a:'Daniel has <strong>20+ years of experience</strong> in web design and internet programming. Since graduating in 2005, he has stayed ahead of evolving trends and technologies to deliver modern, effective digital experiences — from fast static sites to complex WordPress builds and full eCommerce stores.'},
  {k:['diploma','education','certified','credentials','qualified','degree','2005','internet programming','post secondary','trained'],t:'ABOUT DANIEL',a:'Daniel graduated in <strong>2005</strong> with an <strong>Internet Programming and Website Design Specialist Diploma</strong> from an accredited private post-secondary institution in British Columbia, Canada. That formal foundation — combined with 20+ years of real-world practice — means you\'re getting both theory and proven expertise.'},
  {k:['brochure','download','pdf','print flyer','marketing material','web services brochure'],t:'ABOUT DANIEL',a:'Daniel has downloadable brochures available — including a 3-panel folding brochure and a full Web Services brochure PDF — at <strong>w3bmstr.wordpress.com/about</strong>. These are great for sharing with a colleague or keeping as a reference for services and pricing.'},
  {k:['why choose daniel','why choose you','why w3bmstr','why not agency','what makes you different','why hire you','why not fiverr'],t:'ABOUT DANIEL',a:'With Daniel, you get <strong>20+ years of hands-on expertise</strong>, direct communication with the person actually building your site, competitive pricing, and full ownership of everything delivered. No agency markups, no junior developers on your project, and no lock-in. You deal directly with the expert — start to finish.'},
  {k:['what is w3bmstr','w3b mstr','webmaster','what does w3bmstr mean','brand name'],t:'ABOUT DANIEL',a:'<strong>W3B&#127809;MSTR</strong> is Daniel Wilds\' web design brand — a stylized take on "Web Master" with the Canadian maple leaf paying homage to his British Columbia roots. The brand represents craftsmanship, expertise, and a distinctly Canadian approach to digital presence.'},
  {k:['portfolio page','project examples','past projects','case studies','w3bmstr portfolio','work samples'],t:'PORTFOLIO',a:'Daniel\'s portfolio is at <strong>w3bmstr.wordpress.com/portfolio</strong> and includes creative web projects, storytelling sites, and business builds. For industry-specific samples or a direct walkthrough of relevant past work, email <strong>danieldavidwilds@gmail.com</strong>.'},
  {k:['other clients','past clients','who have you worked with','industries','what industries','what sectors'],t:'ABOUT DANIEL',a:'Daniel has worked with clients across trades, retail, health & wellness, professional services, creative arts, food & beverage, and more. For examples from your specific industry, email <strong>danieldavidwilds@gmail.com</strong> and he\'ll share the most relevant work.'},

  {k:['too expensive','cant afford','over budget','cheaper option','discount','negotiate price','lower price','better deal','reduce cost','out of budget'],t:'OBJECTIONS',a:'That\'s a fair concern — web design is an investment. Daniel\'s pricing reflects 20+ years of expertise and real business value. That said, he\'s happy to scope something smaller that fits your current budget, then expand later. Email <strong>danieldavidwilds@gmail.com</strong> for an honest, no-pressure conversation.'},
  {k:['already have a website','have a site','existing website','not sure i need one','why do i need a new site'],t:'OBJECTIONS',a:'If your current site isn\'t generating leads, loads slowly, looks dated, or isn\'t mobile-friendly — it\'s likely costing you business. Daniel can audit your existing site and give you an honest assessment: a few targeted upgrades, a refresh, or a full rebuild. No pressure — just clarity.'},
  {k:['do it myself','diy website','build it myself','use wix myself','use squarespace myself','why hire a designer'],t:'OBJECTIONS',a:'DIY builders work for very basic needs. The tradeoffs: slower performance, template appearances, recurring platform fees, limited SEO, and you don\'t truly own it. A professionally built site is faster, fully yours, and built to convert visitors into customers. Most business owners find their time is worth more than the savings.'},
  {k:['need to think about it','not sure yet','maybe later','need time to decide','will consider it'],t:'OBJECTIONS',a:'No rush at all. When you\'re ready, Daniel will be here. One thing to keep in mind: every month without a strong web presence is a month your competitors have the advantage. A quick no-obligation conversation costs nothing — reach out anytime at <strong>danieldavidwilds@gmail.com</strong> or <strong>(604) 901-1692</strong>.'},
  {k:['guarantee','refund','satisfaction guarantee','not happy with result','what if i hate it','warranty on website'],t:'PROCESS',a:'Daniel\'s process includes defined revision rounds so your input shapes the outcome at every stage. Thorough discovery and clear communication upfront means surprises are rare. If something isn\'t right, it gets fixed. The goal is a result you\'re genuinely proud of — not just something that gets signed off.'},
  {k:['free consultation','free quote','no obligation quote','no cost estimate','initial call free'],t:'CONTACT',a:'Yes — Daniel offers a <strong>free, no-obligation consultation and quote</strong> for every project. Just reach out with a brief description of what you need: your business type, goals, and any features you want. He\'ll respond with a clear scope, timeline, and price. Email <strong>danieldavidwilds@gmail.com</strong> or call <strong>(604) 901-1692</strong>.'},

  {k:['graphic design service','custom graphics service','banner design','poster design','digital visual assets','brand graphics'],t:'BRANDING',a:'Yes. Daniel provides <strong>graphic design</strong> — custom banners, social media graphics, posters, and branded visual assets for web and print. Starts at <strong>$150 CAD</strong>. Essential for keeping your brand consistent across every channel.'},
  {k:['coming soon page','pre launch page','under construction page','placeholder site','launch placeholder'],t:'GENERAL WEB DESIGN',a:'Yes. A professional <strong>coming soon page</strong> lets you claim your domain, capture leads, and build buzz before your full site launches. Starts at <strong>$150 CAD</strong>.'},
  {k:['backlinks','link building','off page seo','inbound links','domain authority','link profile'],t:'SEO',a:'Backlinks from reputable sites are one of Google\'s top ranking signals. Daniel focuses first on a solid <strong>on-page and technical SEO</strong> foundation. For off-page link building strategies, he can advise as part of an advanced SEO package. Email <strong>danieldavidwilds@gmail.com</strong> to discuss.'},
  {k:['get more reviews','review strategy','ask for reviews','google reviews','encourage reviews','reputation management'],t:'BUSINESS LISTINGS',a:'Yes. Pro and Elite listing packages include <strong>review monitoring</strong> — you\'re notified when new reviews come in so you can respond promptly. Responding to reviews is a key local SEO ranking factor. Daniel can also advise on ethical, effective strategies to generate more reviews from happy clients.'},
  {k:['blog setup','add a blog','start a blog','wordpress blog','content marketing','posting content regularly'],t:'WORDPRESS',a:'Yes. WordPress is built for blogging. Daniel sets up a complete blog section with categories, tags, author profiles, social sharing, and SEO-optimized structure. Regular blogging is one of the most effective long-term SEO strategies. Blog setup is included in Business Pro and Custom packages.'},
  {k:['shopify vs woocommerce','which is better shopify woocommerce','shopify or woocommerce','woocommerce vs shopify'],t:'GENERAL WEB DESIGN',a:'Both are excellent with different strengths. <strong>Shopify</strong> is fully hosted, simpler to manage, and great for pure retail. <strong>WooCommerce</strong> runs on WordPress — more flexibility, full control, and lower ongoing costs — but requires more maintenance. Daniel builds with both and recommends the best fit for your business model.'},
  {k:['free website','no cost website','cheap website option','budget website'],t:'GENERAL WEB DESIGN',a:'Free builders like WordPress.com, Wix, and Squarespace exist — but come with tradeoffs: their branding, restricted features, recurring fees, weak SEO, and no real ownership. A professionally built site is an investment that pays back through better visibility, trust, and leads. Free platforms are rarely truly free long-term.'},
  {k:['ux design','user experience design','wireframes','mockup design','prototype','design process stages'],t:'GENERAL WEB DESIGN',a:'Yes. Daniel\'s design process includes planning layouts, building mockups, and reviewing structure before development begins — ensuring the final site is intuitive and conversion-focused, not just beautiful. For advanced projects, full wireframes and interactive prototypes can be scoped in.'},
  {k:['cdn setup','cloudflare setup','content delivery network','site speed globally','global performance'],t:'GENERAL WEB DESIGN',a:'Yes. Daniel can configure a <strong>CDN (Content Delivery Network)</strong> like Cloudflare to serve your files from servers closest to each visitor worldwide. This reduces load times globally and adds a layer of DDoS protection. Can be added to any hosting setup.'},
  {k:['yelp listing','yelp setup','yelp business listing','yelp visibility'],t:'BUSINESS LISTINGS',a:'Yelp listing setup is included in the <strong>Pro</strong> and <strong>Elite</strong> visibility packages. Yelp is especially valuable for restaurants, home services, health, beauty, and retail businesses — and is a trusted platform for customer reviews that influence buying decisions.'},
  {k:['yellowpages','yellow pages','foursquare listing','local directories','directory listings','citation building','nap directories'],t:'BUSINESS LISTINGS',a:'The <strong>Elite Visibility Package</strong> includes listings on <strong>5+ directories</strong> — Yelp, YellowPages, Foursquare, and more — with SEO optimization on all of them. Consistent presence across multiple directories reinforces local authority and improves search rankings.'},
  {k:['bing listing','bing places','microsoft copilot search','bing maps listing','bing business setup'],t:'BUSINESS LISTINGS',a:'<strong>Bing Places for Business</strong> makes your business visible on Bing Search, Bing Maps, <strong>Microsoft Copilot</strong>, and Windows search. Included in all three visibility packages. It\'s fast to set up and valuable — especially for reaching audiences on Microsoft devices.'},
  {k:['update my listing','change business hours','update listing photos','listing info change','listing management'],t:'BUSINESS LISTINGS',a:'Pro and Elite packages include <strong>monthly listing updates</strong> — hours, photos, seasonal promotions, and corrections if Google auto-suggests changes. Keeping listings current is important for both local rankings and customer trust.'},
  {k:['image optimization','photo optimization','compress images','resize images','image seo strategy'],t:'SEO',a:'Yes. Daniel renames image files with descriptive keywords, adds proper alt text, compresses for speed, and converts to <strong>WebP</strong> format. For local businesses, geotagging photos adds location metadata that improves local search visibility. Image SEO is standard on every build.'},
  {k:['faqs page','frequently asked questions','common questions','faq section'],t:'CONTACT',a:'Daniel maintains a FAQ page at <strong>w3bmstr.wordpress.com/faqs</strong> with answers to the most common questions about services, process, and pricing. You can also ask this assistant anything, or email <strong>danieldavidwilds@gmail.com</strong> directly.'},
  {k:['visit website','full website','w3bmstr website','daniel website','your main site'],t:'ABOUT DANIEL',a:'The full W3B&#127809;MSTR website is at <strong>w3bmstr.wordpress.com</strong>. It covers services, pricing, packages, portfolio, computers, and a contact form. For the fastest response, email <strong>danieldavidwilds@gmail.com</strong> or call <strong>(604) 901-1692</strong>.'},
  {k:['branding kit','brand kit','brand package','full brand identity','brand guidelines','colour palette typography'],t:'BRANDING',a:'Yes. Daniel creates full <strong>branding kits</strong> — logo, colour palette, typography system, and usage guidelines — ensuring your brand looks consistent across your website, listings, social media, and print. A strong, cohesive brand identity is one of the most valuable assets a business can have.'},

  // ── TERMINOLOGY ───────────────────────────────────────────────────────────
  {k:['what is ssl','ssl certificate','https','padlock icon','secure site','http vs https'],t:'TERMINOLOGY — SSL',a:'<strong>SSL (Secure Sockets Layer)</strong> is the encryption technology that secures data between a visitor\'s browser and your website. Sites with SSL show <strong>"https://"</strong> and a padlock icon in the browser bar. Google flags non-HTTPS sites as "Not Secure," which harms user trust and search rankings. Daniel includes SSL setup as standard on every build.'},
  {k:['what is a cdn','cdn definition','content delivery network','cloudflare cdn','edge server'],t:'TERMINOLOGY — CDN',a:'A <strong>CDN (Content Delivery Network)</strong> is a network of globally distributed servers that delivers your website\'s assets from the location closest to each visitor. This reduces load times worldwide. Cloudflare is the most popular CDN and is free at its base tier. Daniel can configure it as part of performance optimization.'},
  {k:['what is caching','caching definition','browser cache','server cache','page caching','what does caching do'],t:'TERMINOLOGY — CACHING',a:'<strong>Caching</strong> stores pre-generated versions of your web pages so they load instantly instead of being rebuilt from scratch on every visit. Server-side caching tools like WP Rocket or W3 Total Cache dramatically improve WordPress performance and PageSpeed scores.'},
  {k:['what is a domain','domain name definition','what is a url','web address','dot com meaning','register a domain'],t:'TERMINOLOGY — DOMAIN',a:'A <strong>domain name</strong> is your website\'s address on the internet (e.g., yourbusiness.com). Domains are registered annually through a registrar like GoDaddy or Namecheap and typically cost <strong>$15–$20 CAD/year</strong>. Your domain should always be registered in your own name so you remain in control.'},
  {k:['what is web hosting','hosting definition','what is a server','shared hosting','vps hosting','cloud hosting'],t:'TERMINOLOGY — HOSTING',a:'<strong>Web hosting</strong> is the service that stores your website\'s files and makes them accessible on the internet. Options range from shared hosting ($5–$15/month) to VPS and cloud hosting for high-traffic sites. Daniel recommends and sets up the right hosting for your site\'s type, traffic, and performance needs.'},
  {k:['what is wordpress','wordpress definition','what is wp','wordpress cms explained'],t:'TERMINOLOGY — WORDPRESS',a:'<strong>WordPress</strong> is the world\'s most popular Content Management System, powering over 40% of all websites globally. It\'s open-source, flexible, and lets non-technical users manage content without code. Ideal for service businesses, blogs, and eCommerce. Daniel specializes in custom WordPress builds tailored to your brand.'},
  {k:['what is woocommerce','woocommerce definition','woocommerce explained','what does woocommerce do'],t:'TERMINOLOGY — WOOCOMMERCE',a:'<strong>WooCommerce</strong> is the leading eCommerce plugin for WordPress. It transforms a WordPress site into a fully functional online store — product pages, shopping cart, checkout, payment gateways, shipping rules, and inventory management. It\'s free at its core, highly extensible, and the most popular eCommerce platform on the web.'},
  {k:['what is seo','seo definition','what does seo mean','seo explained','what is search engine optimization'],t:'TERMINOLOGY — SEO',a:'<strong>SEO (Search Engine Optimization)</strong> is the practice of improving your website so it ranks higher in Google and other search engines. It covers technical setup (speed, mobile-friendliness), on-page content (keywords, headings, meta tags), and off-page signals (backlinks, business listings). Good SEO means more people find you without paying for ads.'},
  {k:['what is responsive design','responsive definition','what is mobile first design','adaptive design','mobile friendly'],t:'TERMINOLOGY — RESPONSIVE DESIGN',a:'<strong>Responsive design</strong> means your website automatically adjusts its layout for any screen size — desktop, tablet, or phone. One codebase adapts fluidly instead of maintaining separate mobile and desktop sites. Google prioritizes mobile-friendly sites in rankings. All of Daniel\'s builds are fully responsive.'},
  {k:['what is a landing page','landing page definition','what makes a landing page different','landing page vs homepage'],t:'TERMINOLOGY — LANDING PAGE',a:'A <strong>landing page</strong> is a single, focused webpage designed for one specific action — filling a form, calling a number, or buying a product. Unlike a homepage (which serves many purposes), a landing page removes distractions and drives conversions. They\'re the ideal destination for Google Ads and social media campaigns.'},
  {k:['what is a meta description','meta description definition','what is a title tag','meta tags explained'],t:'TERMINOLOGY — META TAGS',a:'A <strong>meta description</strong> is the short paragraph under your page title in Google search results — your first pitch to a searcher. A <strong>title tag</strong> is the clickable blue headline. Both are critical for SEO click-through rates and should include your target keywords naturally. Daniel optimizes these on every page.'},
  {k:['what is alt text','alt text definition','image alt tag','alternative text explained','why use alt text'],t:'TERMINOLOGY — ALT TEXT',a:'<strong>Alt text</strong> is a written description added to images in your website\'s HTML. It serves two purposes: it tells screen readers what an image shows (accessibility), and it tells search engines what the image contains (SEO). Descriptive, keyword-rich alt text improves your visibility in image search and helps with accessibility compliance.'},
  {k:['what is a keyword','keyword definition','what is a search term','keyword meaning in seo','target keyword'],t:'TERMINOLOGY — KEYWORDS',a:'A <strong>keyword</strong> is the word or phrase someone types into a search engine. "Web designer British Columbia" is a keyword. Effective SEO means identifying the keywords your potential customers use, then creating content that clearly answers those searches. Daniel includes keyword research in all SEO services.'},
  {k:['what is bounce rate','bounce rate definition','what does bounce rate mean','high bounce rate'],t:'TERMINOLOGY — BOUNCE RATE',a:'<strong>Bounce rate</strong> is the percentage of visitors who leave your site after viewing only one page without taking any action. A high bounce rate often signals slow load times, confusing navigation, or content that doesn\'t match what people searched for. Good web design and SEO work together to keep bounce rate low.'},
  {k:['what is conversion rate','conversion rate definition','cro meaning','what is a conversion','website conversions'],t:'TERMINOLOGY — CONVERSION RATE',a:'<strong>Conversion rate</strong> is the percentage of visitors who complete a desired action — filling a form, calling you, or making a purchase. If 100 visitors come and 3 contact you, your conversion rate is 3%. A well-designed site with clear calls-to-action consistently outperforms visually impressive but vague sites.'},
  {k:['what is a cta','call to action definition','cta meaning','what is a call to action button'],t:'TERMINOLOGY — CTA',a:'A <strong>CTA (Call to Action)</strong> is any prompt that tells a visitor what to do next — "Get a Free Quote," "Book a Call," "Shop Now," "Contact Us." Every page should have at least one clear, compelling CTA. Daniel designs CTAs strategically to guide visitors toward the action most valuable to your business.'},
  {k:['what is core web vitals','core web vitals definition','cwv','lcp fid cls','google page experience signals'],t:'TERMINOLOGY — CORE WEB VITALS',a:'<strong>Core Web Vitals</strong> are Google\'s real-world performance metrics: <strong>LCP</strong> (Largest Contentful Paint — main content load speed), <strong>INP</strong> (Interaction to Next Paint — responsiveness), and <strong>CLS</strong> (Cumulative Layout Shift — visual stability). Google uses these as ranking signals. Daniel optimizes builds to score well on all three.'},
  {k:['what is schema markup','schema definition','structured data explained','json ld explained','rich results definition'],t:'TERMINOLOGY — SCHEMA',a:'<strong>Schema markup</strong> is code added to your site that helps search engines understand your content precisely. It can produce rich results in Google — star ratings, FAQ dropdowns, business hours, product prices — giving you more search real estate and higher click-through rates. Daniel implements schema as part of advanced SEO.'},
  {k:['what is google analytics','ga4 definition','google analytics explained','website analytics','what does analytics track'],t:'TERMINOLOGY — GOOGLE ANALYTICS',a:'<strong>Google Analytics 4 (GA4)</strong> is Google\'s free website analytics platform. It tracks who visits your site, where they came from, which pages they view, how long they stay, and what actions they take. Combined with Google Search Console, it gives you a complete picture of your site\'s performance and SEO results.'},
  {k:['what is a wordpress plugin','plugin definition','what does a plugin do','wordpress extensions'],t:'TERMINOLOGY — PLUGIN',a:'A <strong>plugin</strong> is an add-on piece of software that extends WordPress\'s built-in functionality — adding contact forms, SEO tools, caching, security, or an online store. WordPress has 60,000+ plugins available. Daniel selects only well-maintained, performance-friendly plugins and keeps the total count lean to protect speed and security.'},
  {k:['what is a wordpress theme','theme definition','what does a theme do','wordpress theme explained'],t:'TERMINOLOGY — THEME',a:'A <strong>WordPress theme</strong> controls the visual design and layout of your site — typography, colours, page structure, and navigation. Daniel installs and customizes premium themes, or builds fully custom themes from scratch for a unique look. A custom theme means no two sites look alike.'},
  {k:['what is a cms','cms definition','content management system explained','what is content management','cms vs html'],t:'TERMINOLOGY — CMS',a:'A <strong>CMS (Content Management System)</strong> is software that lets you create and manage website content without writing code. WordPress is the world\'s most popular CMS — a dashboard where you add pages, write blog posts, upload images, and update text. Daniel\'s WordPress builds include training so you can manage your own content confidently.'},
  {k:['what is pagespeed','pagespeed definition','google pagespeed insights','page speed score','load time score'],t:'TERMINOLOGY — PAGESPEED',a:'<strong>Google PageSpeed Insights</strong> scores your website\'s performance from 0–100. Scores of 90+ are excellent. Fast sites rank better, convert more visitors, and have lower bounce rates. Custom HTML sites typically score 90–100. WordPress sites require careful optimization to reach similar levels — which Daniel addresses in every build.'},
  {k:['what is webp','webp format','webp vs jpg','next gen image format','modern image format'],t:'TERMINOLOGY — WEBP',a:'<strong>WebP</strong> is a modern image format developed by Google that produces files roughly 25–35% smaller than JPEG or PNG at equivalent quality. Smaller images = faster load times and better PageSpeed scores. Daniel converts images to WebP as part of standard optimization on every project.'},
  {k:['what is lazy loading','lazy load definition','deferred image loading','lazy loading images'],t:'TERMINOLOGY — LAZY LOADING',a:'<strong>Lazy loading</strong> is a technique where images and videos only load when they scroll into a visitor\'s view, rather than all at once when the page first loads. This dramatically improves initial page load time and PageSpeed scores — especially important on image-heavy pages like portfolios and product catalogues.'},
  {k:['what is gdpr','gdpr definition','what is pipeda','canada privacy law','cookie law canada','data protection rules'],t:'TERMINOLOGY — GDPR / PIPEDA',a:'<strong>GDPR</strong> (EU) and <strong>PIPEDA</strong> (Canada) are data privacy laws governing how websites collect and handle personal information. If your site uses analytics, contact forms, cookies, or advertising pixels, compliance measures are required — including a privacy policy and cookie consent banner. Daniel sets this up for <strong>$180 CAD</strong>.'},
  {k:['what is a 301 redirect','301 redirect definition','permanent redirect','url redirect explained','what is a redirect'],t:'TERMINOLOGY — 301 REDIRECT',a:'A <strong>301 redirect</strong> permanently sends visitors and search engines from an old URL to a new one. Critical when you redesign your site, change your domain, or restructure pages — it preserves SEO rankings and prevents visitors from landing on broken 404 errors. Setup starts at <strong>$150 CAD</strong>.'},
  {k:['what is ux ui','ux definition','ui definition','user experience explained','user interface explained','ux vs ui'],t:'TERMINOLOGY — UX/UI',a:'<strong>UX (User Experience)</strong> is how easy and enjoyable your site is to use — navigation clarity, information flow, and whether visitors find what they need without frustration. <strong>UI (User Interface)</strong> is the visual design — buttons, colours, typography, layout. Great web design combines both: beautiful and functional. Daniel designs with UX-first principles.'},
  {k:['what is nap','nap definition','name address phone','nap consistency in seo','citation consistency'],t:'TERMINOLOGY — NAP',a:'<strong>NAP</strong> stands for Name, Address, Phone Number. In local SEO, NAP consistency means your business info is identical across every online listing — Google, Bing, Apple Maps, Yelp, and your website. Inconsistencies confuse search engines and hurt local rankings. Daniel ensures NAP consistency across all listings he sets up.'},
  {k:['what is a sitemap','xml sitemap definition','what is sitemap xml','google sitemap','site map meaning'],t:'TERMINOLOGY — SITEMAP',a:'An <strong>XML sitemap</strong> is a file listing every important page on your website, telling search engines how often they\'re updated. Submitting your sitemap to Google Search Console ensures pages are discovered and indexed correctly. Daniel generates and submits sitemaps as part of every full build.'},
  {k:['what is robots txt','robots txt definition','what does robots txt do','disallow crawl','robots txt file'],t:'TERMINOLOGY — ROBOTS.TXT',a:'<strong>robots.txt</strong> is a file in your website\'s root directory that tells search engine crawlers which pages to index and which to ignore. A misconfigured robots.txt can accidentally hide your entire site from Google. Daniel configures it correctly as part of every SEO setup.'},
  {k:['what is a backlink','backlink definition','inbound links','what is link building','why are backlinks important'],t:'TERMINOLOGY — BACKLINKS',a:'A <strong>backlink</strong> is a link from another website pointing to yours. Backlinks from reputable, relevant sites are one of Google\'s strongest ranking signals — they act as a "vote of confidence" in your content. Building high-quality backlinks over time is a key component of long-term SEO strategy.'},
  {k:['what is a caching plugin','wp rocket','w3 total cache','caching plugin wordpress','best caching plugin'],t:'TERMINOLOGY — CACHING PLUGINS',a:'<strong>Caching plugins</strong> like WP Rocket and W3 Total Cache generate static versions of your WordPress pages so they load faster. They also handle file compression, browser caching, and CDN integration. Daniel configures the right caching solution for every WordPress build to maximize performance.'},
  {k:['what is rank math','rank math seo','yoast seo','seo plugin','best seo plugin wordpress'],t:'TERMINOLOGY — SEO PLUGINS',a:'<strong>Rank Math</strong> and <strong>Yoast SEO</strong> are the two leading WordPress SEO plugins. They help manage title tags, meta descriptions, XML sitemaps, schema markup, and on-page SEO analysis. Daniel uses one of these on every WordPress build, configured properly from day one.'},

    const FALLBACK="I don't have a specific answer for that yet — but I can help with <strong>pricing</strong>, <strong>HTML vs WordPress</strong>, <strong>eCommerce</strong>, <strong>SEO</strong>, <strong>business listings</strong>, and <strong>contact info</strong>.\n\nIf you tell me what you're trying to achieve (and your industry), I\'ll point you to the right option. You can also reach Daniel at <strong>danieldavidwilds@gmail.com</strong> or <strong>(604) 901-1692</strong>.";

    function prepKB(){
      for(const e of KB){
        const topicTokens=[...new Set([...tokenize(e.t), ...e.k.flatMap(tokenize)])];
        e._topicTokens=topicTokens;
      }
    }

    function scoreEntry(qNorm,qTokens,e){
      let score=0;
      const HIGH_SIGNAL=new Set([
        'woocommerce','shopify','ecommerce','wordpress','html','seo',
        'logo','maintenance','plugin','theme','brand','copywrit','audit','performance','setup'
      ]);
      for(const rawKey of e.k){
        const keyNorm=norm(rawKey);
        if(!keyNorm) continue;
        if(qNorm.includes(keyNorm)){
          score+=6 + Math.min(6, keyNorm.split(' ').length);
          continue;
        }
        const keyTokens=tokenize(rawKey);
        if(keyTokens.length===0) continue;
        let matched=0;
        for(const kt of keyTokens){ if(fuzzyTokenMatch(qTokens,kt)) matched++; }
        if(matched===0) continue;

        const ratio=matched/keyTokens.length;
        score+=ratio * (keyTokens.length>=3 ? 5 : 3);
        if(ratio===1) score+=2;
        if(keyTokens.length===1 && matched===1 && HIGH_SIGNAL.has(keyTokens[0])) score+=5;
      }

      const topic=e._topicTokens ?? [];
      let topicMatches=0;
      for(const t of topic){ if(qTokens.includes(t)) topicMatches++; }
      score+=Math.min(3, topicMatches*0.5);

      const hasWebsite=qTokens.includes('website');
      const hasPricing=qTokens.includes('cost') || qTokens.includes('price') || qTokens.includes('fee') || qTokens.includes('rate') || qTokens.includes('pricing') || qTokens.includes('much') || qNorm.includes('how much');
      const hasHosting=qTokens.includes('hosting') || qTokens.includes('domain');
      const hasEcom=qTokens.includes('ecommerce') || qTokens.includes('woocommerce') || qTokens.includes('shopify');
      const hasContact=qTokens.includes('contact') || qTokens.includes('email') || qTokens.includes('phone');
      const hasRobots=qTokens.includes('robot') || qTokens.includes('robots') || qTokens.includes('aurora') || qTokens.includes('maya') || qTokens.includes('riley');
      const hasDirectories=qTokens.includes('yelp') || qTokens.includes('facebook') || qTokens.includes('yellowpages') || qTokens.includes('foursquare');
      const hasLogo=qTokens.includes('logo');
      const hasPlugin=qTokens.includes('plugin');
      const hasTheme=qTokens.includes('theme');
      const hasAudit=qTokens.includes('audit');
      const hasBrand=qTokens.includes('brand') || qTokens.includes('branding');
      const hasContent=qTokens.includes('content') || qTokens.includes('copywrit');
      const hasMaintenance=qTokens.includes('maintenance');
      const hasBackups=qTokens.includes('backup') || qTokens.includes('backups');
      const hasPayments=qTokens.includes('payment') || qTokens.includes('gateway') || qTokens.includes('payments');
      const hasOptimization=qTokens.includes('optimization');
      const hasIntegration=qTokens.includes('integration');
      const mentionsUpdatesWord=qNorm.includes('updates');

      if(hasPricing && hasWebsite && e.t.startsWith('PRICING')) score+=6;
      if(hasHosting && !hasWebsite && e.t==='OWNERSHIP') score+=4;
      if(hasEcom && e.t==='GENERAL WEB DESIGN') score+=3;
      if(hasContact && e.t==='CONTACT') score+=3;
      if(hasRobots && e.t==='MEET THE TEAM') score+=3;
      if(hasDirectories && e.t==='BUSINESS VISIBILITY PACKAGES') score+=6;

      if(hasPricing && e.t==='GENERAL WEB DESIGN') score-=30;

      if(hasPricing && e.t.startsWith('PRICE —')) score+=4;
      if(hasPricing && hasLogo && e.t==='PRICE — LOGO DESIGN') score+=8;
      if(hasPricing && hasPlugin && e.t==='PRICE — CUSTOM PLUGIN DEVELOPMENT') score+=7;
      if(hasPricing && hasTheme && e.t==='PRICE — CUSTOM THEME DEVELOPMENT') score+=7;
      if(hasPricing && hasAudit && e.t==='PRICE — ADVANCED SEO AUDIT') score+=7;
      if(hasPricing && hasMaintenance && e.t==='PRICE — MONTHLY WEBSITE MAINTENANCE') score+=6;
      if(hasPricing && hasMaintenance && (hasBackups || hasPlugin) && e.t==='WORDPRESS BREAKDOWN — MAINTENANCE & UPDATES') score+=8;
      if(hasPricing && hasMaintenance && mentionsUpdatesWord && e.t==='WORDPRESS BREAKDOWN — MAINTENANCE & UPDATES') score+=12;
      if(hasPricing && hasBrand && e.t==='WORDPRESS BREAKDOWN — DESIGN & BRANDING') score+=7;
      if(hasPricing && hasContent && e.t==='WORDPRESS BREAKDOWN — CONTENT CREATION') score+=7;
      if(hasPricing && hasEcom && (hasPayments || qTokens.includes('woocommerce') || hasIntegration) && e.t==='WORDPRESS BREAKDOWN — E-COMMERCE INTEGRATION') score+=10;
      if(hasPricing && qTokens.includes('seo') && hasOptimization && e.t==='WORDPRESS BREAKDOWN — SEO OPTIMIZATION') score+=10;

      return score;
    }

    function topSuggestions(q){
      const qNorm=norm(q);
      const baseTokens=tokenize(q);
      const qTokens=expandWithContext(baseTokens);
      const scored=KB.map(e=>({e, s: scoreEntry(qNorm,qTokens,e)}))
        .filter(x=>x.s>0)
        .sort((a,b)=>b.s-a.s);
      const seen=new Set();
      const picks=[];
      for(const x of scored){
        if(seen.has(x.e.t)) continue;
        seen.add(x.e.t);
        picks.push(x.e.t);
        if(picks.length>=3) break;
      }
      return picks;
    }

    function match(q){
      const qNorm=norm(q);
      const baseTokens=tokenize(q);
      const qTokens=expandWithContext(baseTokens);
      let best=null,bestScore=0;
      for(const e of KB){
        const s=scoreEntry(qNorm,qTokens,e);
        if(s>bestScore){bestScore=s;best=e;}
      }
      return bestScore>=4?best:null;
    }

    function addMsg(text,isUser,tag){
      const msgs=document.getElementById('msgs');
      const wrap=document.createElement('div');
      wrap.className='msg '+(isUser?'u':'b');
      const ico=document.createElement('div');
      ico.className='mi';
      ico.textContent=isUser?'👤':'🤖';
      const bbl=document.createElement('div');
      bbl.className='bbl';
      if(tag&&!isUser){
        const t=document.createElement('div');
        t.className='tag';
        t.textContent='▸ '+tag;
        bbl.appendChild(t);
      }
      const p=document.createElement('p');
      p.innerHTML=text;
      bbl.appendChild(p);
      wrap.appendChild(ico);
      wrap.appendChild(bbl);
      msgs.appendChild(wrap);
      msgs.scrollTop=msgs.scrollHeight;
    }

    function addChips(){
      const msgs=document.getElementById('msgs');
      const wrap=document.createElement('div');
      wrap.className='chips';
      CHIPS.forEach(c=>{
        const btn=document.createElement('button');
        btn.className='chip';
        btn.textContent=c.l;
        btn.onclick=()=>{respond(c.q);wrap.remove();};
        wrap.appendChild(btn);
      });
      msgs.appendChild(wrap);
      msgs.scrollTop=msgs.scrollHeight;
    }

    function respond(q){
      addMsg(q,true);
      const hit=match(q);
      setTimeout(()=>{
        if(hit){
          STATE.lastHit=hit;
          addMsg(hit.a,false,hit.t);
          return;
        }
        const sugg=topSuggestions(q);
        const hint=sugg.length?(`<br><br><span class="tag">SUGGESTED</span><br>`+sugg.map(s=>`• ${s}`).join('<br>')):'';
        addMsg(FALLBACK+hint,false,null);
      },320);
    }

    function send(){
      const tin=document.getElementById('tin');
      const q=tin.value.trim();
      if(!q)return;
      tin.value='';
      respond(q);
    }

    document.getElementById('tin').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
